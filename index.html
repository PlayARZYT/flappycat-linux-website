<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappycat Official Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #252538;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #f5c2e7;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #a6adc8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 15px 20px;
            color: #11111b;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-linux { background-color: #a6e3a1; }
        .btn-linux:hover { background-color: #94e2d5; }
        
        .btn-windows { background-color: #89b4fa; }
        .btn-windows:hover { background-color: #b4befe; }
        
        .btn-macos { background-color: #f9e2af; }
        .btn-macos:hover { background-color: #f5e0dc; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐱 Flappycat 🐱</h1>
        <p>Flappycat official website for our small game.</p>
        
        <div class="btn-group">
            <a href="linux-instructions.html" class="btn btn-linux">Download for Linux / Raspberry Pi</a>
            <a href="windows-instructions.html" class="btn btn-windows">Download for Windows</a>
            <a href="macos-instructions.html" class="btn btn-macos">Download for macOS</a>
        </div>
    </div>

</body>
</html>
