<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappycat Official Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #252538;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #f5c2e7;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #a6adc8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #a6e3a1;
            color: #11111b;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 8px;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #94e2d5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐱 Flappycat 🐱</h1>
        <p>Flappycat official website for our small game.</p>
        <!-- This button links to your instructions page -->
        <a href="instructions.html" class="btn">Download for Linux / Raspberry Pi</a>
    </div>

</body>
</html>
